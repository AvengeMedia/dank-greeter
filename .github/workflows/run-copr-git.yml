name: Copr Git Snapshot

on:
  workflow_dispatch:
  schedule:
    # Four times daily (UTC)
    - cron: "0 2,8,14,20 * * *"
  push:
    branches: [master]
    paths:
      - "core/**"
      - "quickshell/**"
      - "assets/**"
      - "Makefile"
      - "distro/fedora/dms-greeter-git.spec"
      - "distro/scripts/copr-upload-git.sh"
      - ".gitmodules"
      - "dank-qml-common"
      - ".github/workflows/run-copr-git.yml"

concurrency:
  group: copr-git-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-upload:
    runs-on: ubuntu-latest
    if: github.repository == 'AvengeMedia/dank-greeter'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Setup build environment
        run: |
          sudo apt-get update
          sudo apt-get install -y rpm wget curl jq gzip python3 python3-pip
          pip3 install copr-cli

      - name: Configure Copr CLI
        run: |
          mkdir -p ~/.config
          cat > ~/.config/copr << EOF
          [copr-cli]
          login = ${{ secrets.COPR_LOGIN }}
          username = avengemedia
          token = ${{ secrets.COPR_TOKEN }}
          copr_url = https://copr.fedorainfracloud.org
          EOF
          chmod 600 ~/.config/copr

      - name: Build SRPM and upload to Copr
        run: bash distro/scripts/copr-upload-git.sh

      - name: Upload SRPM artifact
        uses: actions/upload-artifact@v5
        with:
          name: dms-greeter-git-srpm
          path: ~/rpmbuild/SRPMS/dms-greeter-git-*.src.rpm
          retention-days: 30
          if-no-files-found: warn

      - name: Build summary
        if: always()
        run: |
          echo "### dms-greeter-git Copr Build Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Ref:** \`${{ github.sha }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Project:** https://copr.fedorainfracloud.org/coprs/avengemedia/danklinux/" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Package:** \`dms-greeter-git\` (Conflicts with \`dms-greeter\`)" >> "$GITHUB_STEP_SUMMARY"
