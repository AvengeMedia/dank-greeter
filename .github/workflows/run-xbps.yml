name: Void Linux XBPS Repository

on:
  workflow_dispatch:
    inputs:
      package:
        description: "Package to build"
        required: true
        type: choice
        options:
          - dms-greeter
          - dms-greeter-git
          - both
        default: "dms-greeter"
      version:
        description: "Stable release tag/version (e.g. v1.0.0). Ignored for git"
        type: string
        required: false
      force_rebuild:
        description: "Force rebuilding the package even if it already exists in the repository"
        type: boolean
        required: false
        default: false

permissions:
  contents: read

concurrency:
  group: void-xbps-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-deploy:
    name: Build & Deploy XBPS package
    runs-on: ubuntu-latest
    if: github.repository == 'AvengeMedia/dank-greeter'
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: auto
      AWS_EC2_METADATA_DISABLED: true
      R2_BUCKET: danklinux-void
      R2_ENDPOINT: https://${{ secrets.CLOUDFLARE_ACCOUNT_ID }}.r2.cloudflarestorage.com
      # Shared DMS Void prefix so existing installs keep upgrading.
      R2_PREFIX: dms
      REPOSITORY_DIR: ${{ github.workspace }}/r2-repo
      SOURCE_COMMIT: ${{ github.sha }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Determine packages and stable version
        id: plan
        run: |
          case "${{ github.event.inputs.package }}" in
            both)
              echo 'packages=["dms-greeter","dms-greeter-git"]' >> "$GITHUB_OUTPUT"
              ;;
            dms-greeter|dms-greeter-git)
              echo 'packages=["${{ github.event.inputs.package }}"]' >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "Unsupported package: ${{ github.event.inputs.package }}" >&2
              exit 1
              ;;
          esac

          VERSION="${{ github.event.inputs.version }}"
          if [ -z "$VERSION" ]; then
            VERSION=$(curl -s https://api.github.com/repos/${{ github.repository }}/releases/latest | jq -r '.tag_name')
          fi
          VERSION="${VERSION#v}"
          echo "stable_version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Stable version candidate: ${VERSION:-none}"

      - name: Download current R2 repository
        run: |
          aws --version
          bash distro/scripts/publish-void-r2.sh download

      - name: Install XBPS Static Utilities
        run: |
          mkdir -p ${{ github.workspace }}/xbps
          curl -s -L https://repo-default.voidlinux.org/static/xbps-static-latest.x86_64-musl.tar.xz | tar -xJ -C ${{ github.workspace }}/xbps
          echo "${{ github.workspace }}/xbps/usr/bin" >> $GITHUB_PATH

      - name: Clone void-packages
        run: |
          git clone --depth=1 https://github.com/void-linux/void-packages.git

      - name: Inject templates
        run: |
          cp -R distro/void/srcpkgs/dms-greeter void-packages/srcpkgs/
          cp -R distro/void/srcpkgs/dms-greeter-git void-packages/srcpkgs/

      - name: Enable unprivileged user namespaces (Ubuntu 24.04)
        run: |
          sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0 || true

      - name: Bootstrap xbps-src
        run: |
          cd void-packages
          ./xbps-src binary-bootstrap

      - name: Configure signing keys and trust
        run: |
          echo "${{ secrets.XBPS_PRIVATE_KEY }}" > /tmp/xbps_privkey.pem
          chmod 600 /tmp/xbps_privkey.pem

          openssl rsa -in /tmp/xbps_privkey.pem -pubout -out /tmp/dms-key.pub
          rm -f /tmp/xbps_privkey.pem

          FINGERPRINT=$(openssl rsa -pubin -in /tmp/dms-key.pub -outform DER 2>/dev/null | openssl dgst -md5 -c | tr '[:upper:]' '[:lower:]' | awk '{print $NF}')

          mkdir -p /tmp/keys
          cat <<EOF > "/tmp/keys/${FINGERPRINT}.plist"
          <?xml version="1.0" encoding="UTF-8"?>
          <plist version="1.0">
          <dict>
          	<key>public-key</key>
          	<data>$(base64 -w0 /tmp/dms-key.pub)</data>
          	<key>public-key-size</key>
          	<integer>4096</integer>
          	<key>signature-by</key>
          	<string>AvengeMedia</string>
          </dict>
          </plist>
          EOF

          sudo mkdir -p /var/db/xbps/keys
          sudo cp "/tmp/keys/${FINGERPRINT}.plist" "/var/db/xbps/keys/${FINGERPRINT}.plist"

          mkdir -p void-packages/masterdir/var/db/xbps/keys
          cp "/tmp/keys/${FINGERPRINT}.plist" "void-packages/masterdir/var/db/xbps/keys/${FINGERPRINT}.plist"

          mkdir -p void-packages/etc/xbps.d/keys
          cp "/tmp/keys/${FINGERPRINT}.plist" "void-packages/etc/xbps.d/keys/${FINGERPRINT}.plist"

          mkdir -p void-packages/common/repo-keys
          cp "/tmp/keys/${FINGERPRINT}.plist" "void-packages/common/repo-keys/${FINGERPRINT}.plist"

          rm -rf /tmp/keys /tmp/dms-key.pub

      - name: Configure repositories
        run: |
          echo "repository=https://void.danklinux.com/danklinux/current" >> void-packages/etc/xbps.d/repos-remote.conf
          echo "repository=https://void.danklinux.com/danklinux/current" >> void-packages/etc/xbps.d/repos-remote-x86_64-multilib.conf

          if [ -d "r2-repo/current" ]; then
            mkdir -p void-packages/hostdir/binpkgs
            cp -L r2-repo/current/*.xbps void-packages/hostdir/binpkgs/ 2>/dev/null || true
            xbps-rindex -a void-packages/hostdir/binpkgs/*.xbps 2>/dev/null || true
          fi

      - name: Build packages
        run: |
          mkdir -p r2-repo/current
          FORCE_REBUILD="${{ github.event.inputs.force_rebuild || 'false' }}"
          RELEASE_VER="${{ steps.plan.outputs.stable_version }}"
          PACKAGES='${{ steps.plan.outputs.packages }}'

          cd void-packages

          for PACKAGE in $(echo "$PACKAGES" | jq -r '.[]'); do
            echo "=========================================="
            echo "Building $PACKAGE"
            echo "=========================================="

            if [[ "$PACKAGE" == "dms-greeter-git" ]]; then
              BASE=$(git -C .. describe --tags --abbrev=0 2>/dev/null | sed 's/^v//' || echo "1.0.0")
              [[ -z "$BASE" ]] && BASE="1.0.0"
              COUNT=$(git -C .. rev-list --count HEAD)
              HASH=$(git -C .. rev-parse --short=8 HEAD)
              # Void versions cannot contain '+'; use dotted git form
              GIT_VER="${BASE}.git${COUNT}.${HASH}"

              echo "Preparing dms-greeter-git version $GIT_VER"
              SRC_CACHE="hostdir/sources/dms-greeter-git-${GIT_VER}"
              mkdir -p "$SRC_CACHE"
              # Pack checkout with submodule content (no .git)
              TMP=$(mktemp -d)
              mkdir -p "$TMP/dms-greeter-git-${GIT_VER}"
              git -C .. archive --format=tar HEAD | tar -x -C "$TMP/dms-greeter-git-${GIT_VER}"
              rm -rf "$TMP/dms-greeter-git-${GIT_VER}/dank-qml-common"
              mkdir -p "$TMP/dms-greeter-git-${GIT_VER}/dank-qml-common"
              tar -C ../dank-qml-common --exclude='.git' -cf - . \
                | tar -C "$TMP/dms-greeter-git-${GIT_VER}/dank-qml-common" -xf -
              rm -rf "$TMP/dms-greeter-git-${GIT_VER}/quickshell/DankCommon"
              ln -sfn ../dank-qml-common/DankCommon "$TMP/dms-greeter-git-${GIT_VER}/quickshell/DankCommon"
              tar -C "$TMP" -czhf "${SRC_CACHE}/dms-greeter-git-${GIT_VER}.tar.gz" "dms-greeter-git-${GIT_VER}"
              rm -rf "$TMP"

              CHECKSUM=$(sha256sum "${SRC_CACHE}/dms-greeter-git-${GIT_VER}.tar.gz" | cut -d' ' -f1)
              sed -i "s/^version=.*/version=${GIT_VER}/" srcpkgs/dms-greeter-git/template
              sed -i "s/^checksum=.*/checksum=${CHECKSUM}/" srcpkgs/dms-greeter-git/template
              sed -i "s|^distfiles=.*|distfiles=\"dms-greeter-git-${GIT_VER}.tar.gz\"|" srcpkgs/dms-greeter-git/template

              REV=$(grep -E '^revision=' srcpkgs/dms-greeter-git/template | cut -d= -f2 | tr -d '"')
              EXPECTED_FILE="dms-greeter-git-${GIT_VER}_${REV}.x86_64.xbps"
              if [ -f "../r2-repo/current/$EXPECTED_FILE" ] && [ "$FORCE_REBUILD" != "true" ]; then
                echo "✅ $EXPECTED_FILE already exists, skipping build."
              else
                echo "🔨 Compiling dms-greeter-git..."
                ./xbps-src pkg dms-greeter-git
                rm -f "../r2-repo/current/${EXPECTED_FILE}"
                cp -L "hostdir/binpkgs/${EXPECTED_FILE}" ../r2-repo/current/
              fi
            else
              if [ -z "$RELEASE_VER" ] || [ "$RELEASE_VER" = "null" ]; then
                echo "Could not determine release version for stable package" >&2
                exit 1
              fi
              echo "Updating template for v${RELEASE_VER}"
              TARBALL="$(mktemp)"
              curl -fsSL -o "$TARBALL" "https://github.com/${{ github.repository }}/releases/download/v${RELEASE_VER}/dank-greeter-${RELEASE_VER}.tar.gz"
              RELEASE_CHECKSUM="$(sha256sum "$TARBALL" | cut -d' ' -f1)"
              rm -f "$TARBALL"

              sed -i "s/^version=.*/version=${RELEASE_VER}/" srcpkgs/dms-greeter/template
              sed -i "s/^checksum=.*/checksum=${RELEASE_CHECKSUM}/" srcpkgs/dms-greeter/template

              GREETER_REV=$(grep -E '^revision=' srcpkgs/dms-greeter/template | cut -d= -f2 | tr -d '"')
              EXPECTED_FILE="dms-greeter-${RELEASE_VER}_${GREETER_REV}.x86_64.xbps"

              if [ -f "../r2-repo/current/$EXPECTED_FILE" ] && [ "$FORCE_REBUILD" != "true" ]; then
                echo "✅ $EXPECTED_FILE already exists, skipping build."
              else
                echo "🔨 Compiling dms-greeter (${RELEASE_VER})..."
                ./xbps-src pkg dms-greeter
                rm -f "../r2-repo/current/${EXPECTED_FILE}"
                cp -L "hostdir/binpkgs/${EXPECTED_FILE}" ../r2-repo/current/
              fi
            fi
          done

      - name: Index and sign repository
        run: |
          cd r2-repo/current

          rm -f *.sig

          if ! ls *.xbps 1>/dev/null 2>&1; then
            echo "⚠️ No .xbps files found to index, skipping."
            exit 0
          fi

          xbps-rindex -a $(pwd)/*.xbps
          xbps-rindex --remove-obsoletes $(pwd)

          for sig in *.sig2; do
            [ -e "$sig" ] || break
            [ -f "${sig%.sig2}" ] || rm -f "$sig"
          done

          echo "${{ secrets.XBPS_PRIVATE_KEY }}" > /tmp/xbps_privkey.pem
          chmod 600 /tmp/xbps_privkey.pem

          xbps-rindex --sign --signedby "AvengeMedia <AvengeMedia.US@gmail.com>" --privkey /tmp/xbps_privkey.pem $(pwd)
          xbps-rindex --sign-pkg --privkey /tmp/xbps_privkey.pem $(pwd)/*.xbps

          rm -f /tmp/xbps_privkey.pem

      - name: Publish repository to R2
        run: bash distro/scripts/publish-void-r2.sh publish
