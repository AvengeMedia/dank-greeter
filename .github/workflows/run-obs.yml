name: Update OBS Package

on:
  workflow_dispatch:
    inputs:
      package:
        description: "Package to upload"
        required: true
        type: choice
        options:
          - dms-greeter
          - dms-greeter-git
          - both
        default: "dms-greeter"
      target:
        description: "OBS target(s) to upload"
        required: true
        type: choice
        options:
          - all
          - debian
          - opensuse
        default: "all"
      version:
        description: "Version to upload for stable (e.g. 1.0.0, leave empty for latest release); ignored for git"
        required: false
        default: ""
      rebuild_release:
        description: "Release number for rebuilds (e.g. 2, 3 to increment spec Release / db suffix)"
        required: false
        default: ""
  schedule:
    - cron: "0 5,17,23 * * *" # 12am, 12pm, 6pm EST (05:00, 17:00, 23:00 UTC)

jobs:
  determine-packages:
    runs-on: ubuntu-latest
    if: github.repository == 'AvengeMedia/dank-greeter'
    outputs:
      packages: ${{ steps.set.outputs.packages }}
      target: ${{ steps.set.outputs.target }}
    steps:
      - name: Set package list and target
        id: set
        run: |
          if [[ "${{ github.event_name }}" != "workflow_dispatch" ]]; then
            # schedule → git snapshot only, all targets
            echo 'packages=["dms-greeter-git"]' >> "$GITHUB_OUTPUT"
            echo "target=all" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          case "${{ github.event.inputs.package }}" in
            both)
              echo 'packages=["dms-greeter","dms-greeter-git"]' >> "$GITHUB_OUTPUT"
              ;;
            dms-greeter|dms-greeter-git)
              echo 'packages=["${{ github.event.inputs.package }}"]' >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "Unknown package: ${{ github.event.inputs.package }}" >&2
              exit 1
              ;;
          esac
          echo "target=${{ github.event.inputs.target }}" >> "$GITHUB_OUTPUT"

  update-obs:
    name: Upload ${{ matrix.package }} (${{ needs.determine-packages.outputs.target }})
    needs: determine-packages
    runs-on: ubuntu-latest
    if: github.repository == 'AvengeMedia/dank-greeter'
    strategy:
      fail-fast: false
      matrix:
        package: ${{ fromJSON(needs.determine-packages.outputs.packages) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Install OSC and Go
        run: |
          sudo apt-get update
          sudo apt-get install -y osc golang-go

          mkdir -p ~/.config/osc
          cat > ~/.config/osc/oscrc << EOF
          [general]
          apiurl = https://api.opensuse.org

          [https://api.opensuse.org]
          user = ${{ secrets.OBS_USERNAME }}
          pass = ${{ secrets.OBS_PASSWORD }}
          EOF
          chmod 600 ~/.config/osc/oscrc

      - name: Cache OBS bundled Go toolchains
        uses: actions/cache@v4
        with:
          path: /home/runner/.cache/dms-greeter-obs-go-toolchain
          key: dms-greeter-obs-go-toolchain-${{ runner.os }}-${{ hashFiles('core/go.mod') }}
          restore-keys: |
            dms-greeter-obs-go-toolchain-${{ runner.os }}-

      - name: Upload to OBS
        env:
          REBUILD_RELEASE: ${{ github.event.inputs.rebuild_release }}
        run: |
          PACKAGE="${{ matrix.package }}"
          TARGET="${{ needs.determine-packages.outputs.target }}"
          ARGS=("$PACKAGE")
          case "$TARGET" in
            debian) ARGS+=("debian") ;;
            opensuse) ARGS+=("opensuse") ;;
            all) ;;
            *)
              echo "Unknown target: $TARGET" >&2
              exit 1
              ;;
          esac
          if [[ "$PACKAGE" == "dms-greeter" && -n "${{ github.event.inputs.version }}" ]]; then
            ARGS+=("--version=${{ github.event.inputs.version }}")
          fi
          bash distro/scripts/obs-upload.sh "${ARGS[@]}"

      - name: Summary
        if: always()
        run: |
          echo "### OBS Package Upload" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Package:** ${{ matrix.package }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Target:** ${{ needs.determine-packages.outputs.target }}" >> $GITHUB_STEP_SUMMARY
          if [[ "${{ matrix.package }}" == "dms-greeter" ]]; then
            echo "- **Version:** ${{ github.event.inputs.version || 'latest release' }}" >> $GITHUB_STEP_SUMMARY
          else
            echo "- **Version:** git snapshot from checkout" >> $GITHUB_STEP_SUMMARY
          fi
          if [[ -n "${{ github.event.inputs.rebuild_release }}" ]]; then
            echo "- **Rebuild:** db${{ github.event.inputs.rebuild_release }}" >> $GITHUB_STEP_SUMMARY
          fi
          echo "- **Builds:** https://build.opensuse.org/package/show/home:AvengeMedia:danklinux/${{ matrix.package }}" >> $GITHUB_STEP_SUMMARY
