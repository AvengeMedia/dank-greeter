name: Update PPA Package

on:
  workflow_dispatch:
    inputs:
      package:
        description: "Package to upload"
        required: true
        type: choice
        options:
          - dms-greeter
          - dms-greeter-git
          - both
        default: "dms-greeter"
      series:
        description: "Ubuntu series to upload"
        required: true
        type: choice
        options:
          - all
          - resolute
          - stonking
        default: "all"
      version:
        description: "Version for stable (e.g. 1.0.0); ignored for git"
        required: false
        default: ""
      rebuild_release:
        description: "Base ppa number for rebuilds (e.g. 2 for ppa2; the second series gets +1 when uploading all)"
        required: false
        default: ""

jobs:
  determine-matrix:
    runs-on: ubuntu-latest
    if: github.repository == 'AvengeMedia/dank-greeter'
    outputs:
      series: ${{ steps.set.outputs.series }}
      packages: ${{ steps.set.outputs.packages }}
    steps:
      - name: Set series and packages
        id: set
        run: |
          case "${{ github.event.inputs.series }}" in
            all)
              echo 'series=["resolute","stonking"]' >> "$GITHUB_OUTPUT"
              ;;
            resolute|stonking)
              echo 'series=["${{ github.event.inputs.series }}"]' >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "Unknown series: ${{ github.event.inputs.series }}" >&2
              exit 1
              ;;
          esac
          case "${{ github.event.inputs.package }}" in
            both)
              echo 'packages=["dms-greeter","dms-greeter-git"]' >> "$GITHUB_OUTPUT"
              ;;
            dms-greeter|dms-greeter-git)
              echo 'packages=["${{ github.event.inputs.package }}"]' >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "Unknown package: ${{ github.event.inputs.package }}" >&2
              exit 1
              ;;
          esac

  upload-ppa:
    name: Upload ${{ matrix.package }} (${{ matrix.series }})
    needs: determine-matrix
    runs-on: ubuntu-latest
    if: github.repository == 'AvengeMedia/dank-greeter'
    timeout-minutes: 60
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        package: ${{ fromJSON(needs.determine-matrix.outputs.packages) }}
        series: ${{ fromJSON(needs.determine-matrix.outputs.series) }}
    concurrency:
      group: ppa-${{ matrix.package }}-${{ matrix.series }}
      cancel-in-progress: false

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            debhelper \
            devscripts \
            dput \
            build-essential \
            fakeroot \
            dpkg-dev \
            openssh-client \
            golang-go

      - name: Configure GPG
        env:
          GPG_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
        run: |
          echo "$GPG_KEY" | gpg --import
          GPG_KEY_ID=$(gpg --list-secret-keys --keyid-format LONG | grep sec | awk '{print $2}' | cut -d'/' -f2)
          echo "DEBSIGN_KEYID=$GPG_KEY_ID" >> "$GITHUB_ENV"

      - name: Upload to PPA
        env:
          LAUNCHPAD_SSH_PRIVATE_KEY: ${{ secrets.LAUNCHPAD_SSH_PRIVATE_KEY }}
          LAUNCHPAD_SSH_LOGIN: ${{ secrets.LAUNCHPAD_SSH_LOGIN }}
        run: |
          PACKAGE="${{ matrix.package }}"
          BASE_NUM="${{ github.event.inputs.rebuild_release }}"
          BASE_NUM="${BASE_NUM:-1}"
          if [[ "${{ github.event.inputs.series }}" == "all" && "${{ matrix.series }}" == "stonking" ]]; then
            PPA_NUM=$((BASE_NUM + 1))
          else
            PPA_NUM=$BASE_NUM
          fi

          ARGS=("$PACKAGE" "${{ matrix.series }}" "$PPA_NUM")
          if [[ "$PACKAGE" == "dms-greeter" && -n "${{ github.event.inputs.version }}" ]]; then
            ARGS+=("--version=${{ github.event.inputs.version }}")
          fi
          bash distro/scripts/ppa-upload.sh "${ARGS[@]}"

      - name: Summary
        if: always()
        run: |
          echo "### PPA Package Upload" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Package:** ${{ matrix.package }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Series:** ${{ matrix.series }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **PPA:** https://launchpad.net/~avengemedia/+archive/ubuntu/danklinux/+packages" >> "$GITHUB_STEP_SUMMARY"
