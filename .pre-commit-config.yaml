repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: check-yaml
      - id: end-of-file-fixer
  - repo: local
    hooks:
      - id: go-mod-tidy
        name: go mod tidy
        entry: bash -c 'cd core && go mod tidy'
        language: system
        files: ^core/.*\.(go|mod|sum)$
        pass_filenames: false
      - id: go-fmt
        name: gofmt -s
        entry: bash -c 'cd core && out=$(gofmt -s -l .) && [ -z "$out" ] || { echo "$out"; exit 1; }'
        language: system
        files: ^core/.*\.go$
        pass_filenames: false
      - id: go-vet
        name: go vet
        entry: bash -c 'cd core && CGO_ENABLED=0 go vet ./...'
        language: system
        files: ^core/.*\.go$
        pass_filenames: false
      - id: go-test
        name: go test
        entry: bash -c 'cd core && CGO_ENABLED=0 go test ./...'
        language: system
        files: ^core/.*\.(go|mod|sum)$
        pass_filenames: false
  - repo: local
    hooks:
      - id: no-console-in-qml
        name: no console.* in QML (use Log service)
        entry: bash -c 'if grep -nE "console\.(log|error|info|warn|debug)" "$@"; then echo "Use the Log service (log.info/warn/error/debug/fatal) instead of console.*" >&2; exit 1; fi' --
        language: system
        files: ^quickshell/.*\.qml$
        exclude: ^quickshell/Services/Log\.qml$
